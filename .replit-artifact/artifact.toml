kind = "mobile"
previewPath = "/"
title = "Spin and Win"
version = "1.0.0"
id = "artifacts/spin-and-win"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/" ]
localPort = 19463

[services.development]
run = "pnpm --filter @workspace/spin-and-win run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/spin-and-win", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/spin-and-win", "run", "serve" ]

[services.env]
PORT = "19463"
BASE_PATH = "/"
